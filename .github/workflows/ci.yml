name: Minimal CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile lightweight Python modules
        run: |
          python -m py_compile scripts/smoke_test.py scripts/summarize_data_manifests.py scripts/train_scratch_resnet18.py scripts/evaluate_scratch_resnet18.py scripts/analyze_scratch_evaluation.py scripts/create_continual_task_plan.py src/config.py src/evaluation.py src/advanced/continual_learning.py src/deep_learning/checkpoint.py src/deep_learning/trainer.py

      - name: Run manifest smoke test
        run: |
          python scripts/smoke_test.py

      - name: Summarize data manifests
        run: |
          python scripts/summarize_data_manifests.py --output /tmp/manifest_summary.json

      - name: Verify continual-learning task plan
        run: |
          python scripts/create_continual_task_plan.py --check
